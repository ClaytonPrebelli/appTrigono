name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  APK_PATH: android/app/build/outputs/apk/release/app-release.apk

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 23

      - name: Install dependencies
        run: npm ci

      - name: Check types
        run: npx tsc --noEmit

      - name: Prebuild Expo
        run: npx expo prebuild --platform android --clean

      - name: Replace broken hermesc with a wrapper (skip bytecode compilation)
        run: |
          HERMESC=node_modules/react-native/sdks/hermesc/linux64-bin/hermesc
          cat > "$HERMESC" << 'EOF'
          #!/bin/bash
          # Invocation: hermesc -w -emit-binary ... -out OUTPUT INPUT [-O -output-source-map]
          next_is_out=false
          output=""
          input=""
          has_source_map=false
          for arg in "$@"; do
            if $next_is_out; then output="$arg"; next_is_out=false; continue; fi
            if [[ "$arg" == "-out" ]]; then next_is_out=true; continue; fi
            if [[ "$arg" == "-output-source-map" ]]; then has_source_map=true; continue; fi
            if [[ "$arg" != -* ]] && [[ -z "$input" ]]; then input="$arg"; fi
          done
          if [ -n "$input" ] && [ -n "$output" ]; then
            cp "$input" "$output"
            if $has_source_map; then echo '{"version":3,"sources":[],"names":[],"mappings":""}' > "${output}.map"; fi
          fi
          EOF
          chmod +x "$HERMESC"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Read version from app.json
        id: version
        run: echo "tag=v$(node -p "require('./app.json').expo.version")" >> $GITHUB_OUTPUT

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: portal-trigono-apk
          path: ${{ env.APK_PATH }}

      - name: Delete existing release with same tag (if any)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete "${{ steps.version.outputs.tag }}" --yes --cleanup-tag 2>/dev/null || true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            "${{ env.APK_PATH }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes "Build automático #${{ github.run_number }}" \
            --generate-notes
